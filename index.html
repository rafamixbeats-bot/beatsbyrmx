<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RMX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            animation: {
              marquee: 'marquee 30s linear infinite',
            },
            keyframes: {
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              },
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #000000;
        color: #cbd5e1; /* slate-300 */
        /* Logo como background fixo com overlay escuro */
        background-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.95));
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-size: cover;
      }
      ::selection {
        background-color: rgba(74, 222, 128, 0.4);
        color: #4ade80;
      }
      /* Custom scrollbar for a better look */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #020617; /* slate-950 */
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b; /* slate-800 */
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #334155; /* slate-700 */
      }
      @keyframes toast-in {
        from {
          opacity: 0;
          transform: translateX(100%);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .animate-toast-in {
        animation: toast-in 0.3s ease-out forwards;
      }
      /* Custom Range Input - UPDATED TO LAB GREEN */
      input[type=range].player-progress {
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
        cursor: pointer;
        position: relative;
      }
      input[type=range].player-progress::-webkit-slider-runnable-track {
        background: transparent;
        height: 0.25rem;
        border-radius: 0.5rem;
      }
      input[type=range].player-progress::-moz-range-track {
        background: transparent;
        height: 0.25rem;
        border-radius: 0.5rem;
      }
      input[type=range].player-progress::-moz-range-progress {
        background: transparent;
        height: 0.25rem;
        border-radius: 0.5rem;
      }
      input[type=range].player-progress::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        margin-top: -4px;
        background-color: #4ade80; /* green-400 */
        height: 12px;
        width: 12px;
        border-radius: 9999px;
        transition: background-color 0.2s;
        box-shadow: 0 0 5px rgba(74, 222, 128, 0.5);
      }
      input[type=range].player-progress:hover::-webkit-slider-thumb {
        background-color: #22c55e; /* green-500 */
        transform: scale(1.1);
      }
      input[type=range].player-progress::-moz-range-thumb {
        border: none;
        background-color: #4ade80;
        height: 12px;
        width: 12px;
        border-radius: 9999px;
        transition: background-color 0.2s;
        box-shadow: 0 0 5px rgba(74, 222, 128, 0.5);
      }
      input[type=range].player-progress:hover::-moz-range-thumb {
        background-color: #22c55e;
      }
      @keyframes waveSlide {
        0% { transform: translateY(-50%) translateX(0); }
        100% { transform: translateY(-50%) translateX(-50%); }
      }
      @keyframes waveSlideReverse {
        0% { transform: translateY(-50%) translateX(-50%); }
        100% { transform: translateY(-50%) translateX(0); }
      }
      @keyframes waveBar {
        0% { transform: scaleY(0.3); opacity: 0.4; }
        100% { transform: scaleY(1); opacity: 1; }
      }
      /* ECG Heartbeat Background */
      .ecg-container {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .ecg-line {
        stroke: #22c55e;
        stroke-width: 1.2;
        fill: none;
        opacity: 0.22;
        filter: drop-shadow(0 0 8px rgba(34,197,94,0.9));
      }
      .ecg-line-glow {
        stroke: #4ade80;
        stroke-width: 3;
        fill: none;
        opacity: 0.08;
        filter: blur(3px);
      }
      .ecg-track {
        width: 200%;
        animation: ecgScroll 20s linear infinite;
      }
      @keyframes ecgScroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      @keyframes heartbeat {
        0%, 100% { transform: scale(1); opacity: 1; }
        15% { transform: scale(1.15); opacity: 1; }
        30% { transform: scale(1); opacity: 1; }
        45% { transform: scale(1.1); opacity: 0.9; }
        60% { transform: scale(1); opacity: 1; }
      }
      .animate-heartbeat {
        animation: heartbeat 1.2s ease-in-out infinite;
      }
      @keyframes ecgDraw {
        0% { stroke-dashoffset: 400; }
        100% { stroke-dashoffset: 0; }
      }
      .animate-ecg-draw {
        stroke-dasharray: 400;
        animation: ecgDraw 1.5s ease-in-out infinite;
      }
      /* Glitch Text Effect */
      .glitch-text {
        position: relative;
        animation: glitch-skew 4s infinite linear alternate-reverse;
      }
      .glitch-text-before,
      .glitch-text-after {
        content: '';
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      .glitch-text-before {
        color: #f0f;
        animation: glitch-before 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
        clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        opacity: 0.8;
      }
      .glitch-text-after {
        color: #0ff;
        animation: glitch-after 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) reverse both infinite;
        clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        opacity: 0.8;
      }
      @keyframes glitch-before {
        0% { transform: translate(0); }
        2% { transform: translate(3px, -2px); }
        4% { transform: translate(-3px, 2px); }
        6% { transform: translate(0); }
        20% { transform: translate(0); }
        22% { transform: translate(-2px, 1px); }
        24% { transform: translate(2px, -1px); }
        26% { transform: translate(0); }
        48% { transform: translate(0); }
        50% { transform: translate(2px, 2px); }
        52% { transform: translate(-2px, -2px); }
        54% { transform: translate(0); }
        100% { transform: translate(0); }
      }
      @keyframes glitch-after {
        0% { transform: translate(0); }
        3% { transform: translate(-3px, 1px); }
        6% { transform: translate(3px, -1px); }
        9% { transform: translate(0); }
        30% { transform: translate(0); }
        33% { transform: translate(2px, -2px); }
        36% { transform: translate(-2px, 2px); }
        39% { transform: translate(0); }
        60% { transform: translate(0); }
        63% { transform: translate(-1px, -1px); }
        66% { transform: translate(1px, 1px); }
        69% { transform: translate(0); }
        100% { transform: translate(0); }
      }
      @keyframes glitch-skew {
        0% { transform: skew(0deg); }
        2% { transform: skew(0.5deg); }
        4% { transform: skew(-0.3deg); }
        6% { transform: skew(0deg); }
        40% { transform: skew(0deg); }
        42% { transform: skew(-0.4deg); }
        44% { transform: skew(0.2deg); }
        46% { transform: skew(0deg); }
        100% { transform: skew(0deg); }
      }
      /* Glitch Box Effect */
      .glitch-box {
        animation: glitch-box-skew 4s infinite linear alternate-reverse;
      }
      .glitch-box::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(transparent 40%, rgba(0, 255, 255, 0.03) 40%, rgba(0, 255, 255, 0.03) 60%, transparent 60%);
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 10;
        animation: glitch-scanlines 0.3s infinite linear;
      }
      .glitch-box::after {
        content: '';
        position: absolute;
        top: 0;
        left: -2px;
        width: calc(100% + 4px);
        height: 100%;
        background: transparent;
        border: 1px solid rgba(74, 222, 128, 0.1);
        pointer-events: none;
        z-index: 5;
        animation: glitch-border 3s infinite;
      }
      @keyframes glitch-box-skew {
        0% { transform: skew(0deg); }
        1% { transform: skew(0.2deg); }
        2% { transform: skew(-0.1deg); }
        3% { transform: skew(0deg); }
        50% { transform: skew(0deg); }
        51% { transform: skew(-0.15deg); }
        52% { transform: skew(0.1deg); }
        53% { transform: skew(0deg); }
        100% { transform: skew(0deg); }
      }
      @keyframes glitch-scanlines {
        0% { background-position: 0 0; }
        100% { background-position: 0 4px; }
      }
      @keyframes glitch-border {
        0%, 100% { border-color: rgba(74, 222, 128, 0.1); }
        25% { border-color: rgba(74, 222, 128, 0.3); }
        50% { border-color: rgba(0, 255, 255, 0.2); }
        75% { border-color: rgba(255, 0, 255, 0.2); }
      }
    </style>

</head>
  <body class="bg-black text-slate-300 antialiased">
    <!-- ECG Heartbeat Background -->
    <div class="ecg-container">
      <svg class="ecg-track" viewBox="0 0 3200 200" preserveAspectRatio="none" style="height:100%">
        <defs>
          <pattern id="ecgPattern" x="0" y="0" width="800" height="200" patternUnits="userSpaceOnUse">
            <!-- Classic ECG: flat → P wave → QRS spike → T wave → flat -->
            <path class="ecg-line-glow" d="M0,100 L120,100 Q140,100 150,90 Q160,80 170,90 Q180,100 200,100 L260,100 L270,105 L280,100 L290,30 L300,170 L310,20 L320,100 L380,100 Q400,100 410,92 Q420,84 430,92 Q440,100 460,100 L800,100" />
            <path class="ecg-line" d="M0,100 L120,100 Q140,100 150,90 Q160,80 170,90 Q180,100 200,100 L260,100 L270,105 L280,100 L290,30 L300,170 L310,20 L320,100 L380,100 Q400,100 410,92 Q420,84 430,92 Q440,100 460,100 L800,100" />
          </pattern>
        </defs>
        <rect width="3200" height="200" fill="url(#ecgPattern)" />
      </svg>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
